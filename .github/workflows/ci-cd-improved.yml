name: 🚀 CI/CD Pipeline Mejorado

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  NODE_VERSION: '22'
  CACHE_VERSION: 'v2'

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write
  deployments: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Análisis de código y seguridad
  code-analysis:
    name: 🔍 Análisis de Código
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/website-epic/package-lock.json

      - name: 📦 Install Dependencies
        run: |
          cd frontend/website-epic
          npm ci

      - name: 🔍 Type Check
        run: |
          cd frontend/website-epic
          npm run type-check

      - name: 🧹 Lint Code
        run: |
          cd frontend/website-epic
          npm run lint

      - name: 🔒 Security Scan
        uses: securecodewarrior/github-action-add-sarif@v1
        with:
          sarif-file: 'frontend/website-epic/security-scan-results.sarif'

      - name: 📊 Complexity Analysis
        run: |
          cd frontend/website-epic
          npx complexity-report --output json --format json src/ > complexity-report.json

      - name: 📈 Bundle Analysis
        run: |
          cd frontend/website-epic
          npm run build
          npx webpack-bundle-analyzer dist/static/js/*.js --mode json > bundle-analysis.json

  # Tests automatizados
  tests:
    name: 🧪 Tests Automatizados
    runs-on: ubuntu-latest
    needs: code-analysis
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/website-epic/package-lock.json

      - name: 📦 Install Dependencies
        run: |
          cd frontend/website-epic
          npm ci

      - name: 🧪 Unit Tests
        run: |
          cd frontend/website-epic
          npm run test:run

      - name: 📊 Coverage Report
        run: |
          cd frontend/website-epic
          npm run test:coverage

      - name: 📋 Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: frontend/website-epic/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: 🎭 Component Tests
        run: |
          cd frontend/website-epic
          npm run test -- --coverage --watchAll=false

      - name: 📝 E2E Tests
        run: |
          cd frontend/website-epic
          npm run build
          npm run test:e2e

  # Build y optimización
  build:
    name: 🏗️ Build y Optimización
    runs-on: ubuntu-latest
    needs: [code-analysis, tests]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/website-epic/package-lock.json

      - name: 📦 Install Dependencies
        run: |
          cd frontend/website-epic
          npm ci

      - name: 🏗️ Build Production
        run: |
          cd frontend/website-epic
          npm run build

      - name: 📊 Bundle Analysis
        run: |
          cd frontend/website-epic
          npx bundlesize

      - name: 📈 Performance Budget Check
        run: |
          cd frontend/website-epic
          node scripts/check-bundle-size.js

      - name: 📦 Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          path: frontend/website-epic/dist/
          retention-days: 30

  # Deploy a staging
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.aigestion.net
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: frontend/website-epic/dist/

      - name: 🚀 Deploy to Staging
        run: |
          echo "Deploying to staging environment"
          # Aquí iría el deploy a staging (Vercel, Netlify, etc.)

      - name: 🧪 Run Staging Tests
        run: |
          echo "Running staging smoke tests"
          # Tests automatizados en staging

  # Deploy a producción
  deploy-production:
    name: 🚀 Deploy Producción
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://aigestion.net
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: frontend/website-epic/dist/

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/website-epic/dist/

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Performance Monitoring
        run: |
          echo "Deployed to production"
          curl -s "https://aigestion.net" > /dev/null && echo "✅ Site is live" || echo "❌ Site not responding"

      - name: 📧 Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: |
            🚀 Deploy AIGestion.net
            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            URL: https://aigestion.net

  # Tests post-deploy
  post-deploy-tests:
    name: 🧪 Tests Post-Deploy
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 🌐 Health Check
        run: |
          echo "Checking production health..."
          curl -f https://aigestion.net/api/health || exit 1

      - name: 📊 Performance Test
        run: |
          echo "Running performance tests..."
          npx lighthouse https://aigestion.net --output=json --output-path=lighthouse-results.json

      - name: 🔍 Security Scan
        run: |
          echo "Running security scan..."
          npx zap-baseline.py -t https://aigestion.net -J zap-results.json

      - name: 📋 Upload Test Results
        uses: actions/upload-artifact@v6
        with:
          name: post-deploy-results
          path: |
            lighthouse-results.json
            zap-results.json

  # Release automation
  release:
    name: 🎉 Release Automation
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [build]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Create Release Notes
        run: |
          echo "Creating release notes for ${{ github.ref_name }}"

      - name: 📦 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: frontend/website-epic/dist/

      - name: 📤 Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/website-epic/dist/**/*
          draft: false
          prerelease: false

  # Rollback automático
  rollback:
    name: 🔄 Rollback Automático
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: deploy-production
    steps:
      - name: 🔄 Rollback Deployment
        run: |
          echo "Rolling back to previous version"
          # Lógica de rollback aquí

      - name: 📧 Rollback Notification
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          channel: '#deployments'
          text: |
            🔄 Rollback AIGestion.net
            Reason: Deploy failed
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
